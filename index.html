<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>租房经营管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #165DFF;
  --primary-dark: #0E42D2;
  --primary-light: #E8F3FF;
  --success: #00B42A;
  --success-bg: #E8FFEA;
  --danger: #F53F3F;
  --danger-bg: #FFECE8;
  --warning: #FF7D00;
  --warning-bg: #FFF4E8;
  --bg: #F7F8FA;
  --surface: #ffffff;
  --text: #1D2129;
  --text2: #4E5969;
  --text3: #86909C;
  --border: #E5E6EB;
  --hover: #F2F3F5;
  --sidebar-w: 240px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 10px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  overflow-x: hidden;
  font-size: 15px;
}

.layout {
  display: flex;
  min-height: 100vh;
  position: relative;
}

/* 侧边栏 */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 999;
  display: flex;
  flex-direction: column;
  transition: transform 0.25s ease;
}

.sidebar h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  padding: 20px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar h1 small {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--text3);
  margin-top: 4px;
}

.nav {
  flex: 1;
  padding: 12px 8px;
  overflow-y: auto;
}

.nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  margin-bottom: 4px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  color: var(--text2);
  text-decoration: none;
  transition: all 0.2s;
  font-weight: 500;
}

.nav a:hover {
  background: var(--hover);
  color: var(--text);
}

.nav a.active {
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

.nav a .badge {
  margin-left: auto;
  font-size: 12px;
  background: var(--primary);
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  min-width: 22px;
  text-align: center;
}

/* 主内容 */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  width: calc(100% - var(--sidebar-w));
}

.page-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.page-header h2 {
  font-size: 22px;
  font-weight: 600;
}

.page-header .sub {
  font-size: 14px;
  color: var(--text3);
  margin-top: 4px;
}

.page-body {
  padding: 24px;
}

/* 卡片 */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.card-header h3 {
  font-size: 16px;
  font-weight: 600;
}

/* 统计卡片网格 */
.grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--primary);
  transition: transform 0.2s;
}

.stat-card:hover {
  transform: translateY(-2px);
}

.stat-card .label {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 6px;
}

.stat-card .value {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
}

.stat-card .change {
  font-size: 12px;
  margin-top: 6px;
}

.stat-card.green { border-left-color: var(--success); }
.stat-card.red { border-left-color: var(--danger); }
.stat-card.yellow { border-left-color: var(--warning); }

/* 表格 */
.table-wrap {
  overflow-x: auto;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

thead th {
  background: var(--bg);
  padding: 14px 16px;
  text-align: left;
  font-weight: 600;
  font-size: 14px;
  color: var(--text2);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}

tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tbody tr:hover {
  background: var(--hover);
}

/* 标签 */
.tag {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}

.tag-success { background: var(--success-bg); color: var(--success); }
.tag-danger { background: var(--danger-bg); color: var(--danger); }
.tag-primary { background: var(--primary-light); color: var(--primary); }
.tag-warning { background: var(--warning-bg); color: var(--warning); }
.tag-default { background: var(--hover); color: var(--text2); }

/* 按钮 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  white-space: nowrap;
  min-height: 40px;
}

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); box-shadow: var(--shadow); }

.btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #D93636; }

.btn-sm { padding: 6px 14px; font-size: 13px; min-height: 34px; }

/* 表单 */
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }

.form-control {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  transition: border-color 0.2s;
  background: var(--surface);
}

.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-light);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
}

/* 弹窗 */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}

.modal.show { display: flex; }

.modal-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  width: 90%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.modal-header h3 { font-size: 18px; font-weight: 600; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--border); }

/* 图表容器 */
.chart-container {
  position: relative;
  height: 320px;
  width: 100%;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

/* 空状态 */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

.empty .icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty h4 {
  font-size: 16px;
  margin-bottom: 8px;
  color: var(--text);
}

/* 提示消息 */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 3000;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  max-width: 380px;
}

.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-info { background: var(--primary); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* 移动端菜单按钮 */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1000;
  width: 44px;
  height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* 颜色工具 */
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-primary { color: var(--primary); }
.text-muted { color: var(--text3); }
.text-right { text-align: right; }
.text-center { text-align: center; }

/* 间距 */
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mb-2 { margin-bottom: 16px; }

/* 布局 */
.flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }

/* 滚动条 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===================== 响应式 ===================== */
@media (max-width: 992px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .mobile-toggle { display: flex; }
  .main { margin-left: 0; width: 100%; }
  .page-header { padding: 16px 16px 16px 60px; }
  .page-body { padding: 16px; }
  .page-header h2 { font-size: 20px; }
  .grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .modal-wrap { width: 96%; margin: 10px; }
  .stat-card .value { font-size: 24px; }
  .chart-container { height: 260px; }
  .btn { min-height: 44px; padding: 12px 16px; }
  table { font-size: 14px; }
  tbody td, thead th { padding: 12px; }
}

@media (max-width: 480px) {
  .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .form-actions { flex-direction: column; }
  .btn { width: 100%; }
}
</style>
</head>

<body>
<div class="layout">
  <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
  
  <aside class="sidebar" id="sidebar">
    <h1>🏠 租房管家<small>二房东经营管理系统</small></h1>
    <nav class="nav" id="nav">
      <a class="active" href="#dashboard" onclick="goPage('dashboard')">📊 仪表盘</a>
      <a href="#tenants" onclick="goPage('tenants')">👥 租户管理 <span class="badge" id="tenantBadge">0</span></a>
      <a href="#rooms" onclick="goPage('rooms')">🏢 房间管理 <span class="badge" id="roomBadge">0</span></a>
      <a href="#transactions" onclick="goPage('transactions')">💰 收支流水</a>
      <a href="#ledger" onclick="goPage('ledger')">📒 流水台账</a>
      <a href="#utilities" onclick="goPage('utilities')">⚡ 水电费</a>
      <a href="#deposits" onclick="goPage('deposits')">🔒 押金管理</a>
      <a href="#reports" onclick="goPage('reports')">📈 报表分析</a>
      <a href="#backup" onclick="goPage('backup')">💾 数据备份</a>
    </nav>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-wrap" id="modalContent"></div>
</div>

<script>
// ==================== 全局配置 ====================
const STORE = {
  _data: null,
  _default() {
    return {
      rooms: [
        {id:'r1',name:'305-1',building:'305栋',rent:500,status:'在租',cur:null},
        {id:'r2',name:'305-2',building:'305栋',rent:700,status:'在租',cur:null},
        {id:'r3',name:'305-3',building:'305栋',rent:700,status:'在租',cur:null},
        {id:'r4',name:'305-5',building:'305栋',rent:600,status:'在租',cur:null},
        {id:'r5',name:'305-6',building:'305栋',rent:800,status:'在租',cur:null},
        {id:'r6',name:'106-2',building:'106栋',rent:600,status:'在租',cur:null},
        {id:'r7',name:'106-3',building:'106栋',rent:600,status:'在租',cur:null},
        {id:'r8',name:'106-5',building:'106栋',rent:350,status:'在租',cur:null},
        {id:'r9',name:'106-6',building:'106栋',rent:800,status:'在租',cur:null},
      ],
      tenants: [],
      bills: [],
      ledger: [],
      nid: {r:10,t:100,b:100,l:100}
    };
  },

  init() {
    const local = localStorage.getItem('rentData');
    if (local) {
      try { this._data = JSON.parse(local); }
      catch (e) { this._data = this._default(); }
    } else {
      this._data = this._default();
    }
    if (!this._data.ledger) this._data.ledger = [];
    if (!this._data.nid) this._data.nid = {r:10,t:100,b:100,l:100};
  },

  saveLocal() {
    localStorage.setItem('rentData', JSON.stringify(this._data));
  },

  save() {
    this.saveLocal();
  },

  getData() { return this._data; },

  // 房间
  getRooms() { return this._data.rooms; },
  getRoom(id) { return this._data.rooms.find(r => r.id === id); },
  addRoom(room) { room.id = 'r' + (this._data.nid.r++); this._data.rooms.push(room); this.save(); return room; },
  updateRoom(id, data) {
    const idx = this._data.rooms.findIndex(x => x.id === id);
    if (idx > -1) { Object.assign(this._data.rooms[idx], data); this.save(); return this._data.rooms[idx]; }
    return null;
  },

  // 租户
  getTenants() { return this._data.tenants; },
  getTenant(id) { return this._data.tenants.find(t => t.id === id); },
  addTenant(tenant) {
    tenant.id = 't' + (this._data.nid.t++);
    this._data.tenants.push(tenant);
    const room = this.getRoom(tenant.roomId);
    if (room) { room.cur = tenant.id; room.status = '在租'; }
    this.save();
    return tenant;
  },
  updateTenant(id, data) {
    const idx = this._data.tenants.findIndex(x => x.id === id);
    if (idx > -1) { Object.assign(this._data.tenants[idx], data); this.save(); return this._data.tenants[idx]; }
    return null;
  },
  endTenant(id, endDate) {
    const t = this.getTenant(id);
    if (!t) return null;
    t.endDate = endDate;
    t.depositReturned = true;
    const r = this.getRoom(t.roomId);
    if (r) { r.cur = null; r.status = '空置'; }
    this.save();
    return t;
  },

  // 台账
  getLedger() { return this._data.ledger || []; },
  addLedger(item) { item.id = 'l' + (this._data.nid.l++); this._data.ledger.push(item); this.save(); return item; },
  delLedger(id) { this._data.ledger = this._data.ledger.filter(x => x.id !== id); this.save(); },
  updateLedger(id, data) {
    const idx = this._data.ledger.findIndex(x => x.id === id);
    if (idx > -1) { Object.assign(this._data.ledger[idx], data); this.save(); return this._data.ledger[idx]; }
    return null;
  },

  // 水电费
  getBills() { return this._data.bills; },
  addBill(bill) { bill.id = 'b' + (this._data.nid.b++); this._data.bills.push(bill); this.save(); return bill; },

  // 统计
  summary() {
    const tx = this._data.ledger;
    const income = tx.filter(x => x.收 === '收入').reduce((s, x) => s + (x.金额 || 0), 0);
    const expense = tx.filter(x => x.收 === '支出').reduce((s, x) => s + (x.金额 || 0), 0);
    const now = new Date().toISOString().slice(0, 10);
    const activeTenants = this._data.tenants.filter(t => !t.endDate || t.endDate >= now).length;
    const rentedRooms = this._data.rooms.filter(r => r.status === '在租').length;
    const totalRooms = this._data.rooms.length;
    const depositTotal = this._data.tenants.reduce((s, t) => s + (t.deposit || 0), 0);
    const depositUnreturned = this._data.tenants.filter(t => !t.depositReturned).reduce((s, t) => s + (t.deposit || 0), 0);
    
    const waterIn = tx.filter(x => x.收 === '收入').reduce((s, x) => s + (x.水费 || 0), 0);
    const elecIn = tx.filter(x => x.收 === '收入').reduce((s, x) => s + (x.电费 || 0), 0);
    const utilityOut = this._data.bills.reduce((s, b) => s + b.amount, 0);

    const monthMap = {};
    tx.forEach(t => {
      const m = (t.交易时间 || '').substring(0,7);
      if (!m) return;
      if (!monthMap[m]) monthMap[m] = {i:0, e:0};
      t.收 === '收入' ? monthMap[m].i += t.金额 : monthMap[m].e += t.金额;
    });

    const sourceMap = {};
    this._data.tenants.forEach(t => { sourceMap[t.source] = (sourceMap[t.source] || 0) +1; });

    return {
      income, expense, profit: income-expense,
      activeTenants, rentedRooms, totalRooms,
      vacancyRate: totalRooms > 0 ? Math.round((1 - rentedRooms/totalRooms)*100) : 0,
      depositTotal, depositUnreturned, depositReturned: depositTotal - depositUnreturned,
      waterIn, elecIn, utilityIn: waterIn+elecIn, utilityOut, utilityProfit: (waterIn+elecIn)-utilityOut,
      monthMap, sourceMap
    };
  },

  // 导入导出
  export() { return JSON.stringify(this._data, null, 2); },
  import(data) {
    if (data.rooms) this._data.rooms = data.rooms;
    if (data.tenants) this._data.tenants = data.tenants;
    if (data.bills) this._data.bills = data.bills;
    if (data.ledger) this._data.ledger = data.ledger;
    if (data.nid) this._data.nid = data.nid;
    this.save();
  }
};

// ==================== 工具函数 ====================
let currentPage = 'dashboard';
let charts = {};
const $ = id => document.getElementById(id);

function formatMoney(v) { return '¥' + Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2 }); }
function formatDate(d) { return d ? new Date(d).toLocaleDateString('zh-CN') : '-'; }
function toggleSidebar() { $('sidebar').classList.toggle('open'); }
function closeSidebar() { $('sidebar').classList.remove('open'); }

function showToast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

function openModal(html) {
  $('modalContent').innerHTML = html;
  $('modal').classList.add('show');
}

function closeModal() {
  $('modal').classList.remove('show');
}

function goPage(page) {
  currentPage = page;
  window.location.hash = page;
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  const active = document.querySelector(`.nav a[href="#${page}"]`);
  if (active) active.classList.add('active');
  closeSidebar();
  renderPage(page);
}

// ==================== 页面渲染 ====================
function renderPage(page) {
  const main = $('main');
  const data = STORE.getData();
  const sum = STORE.summary();

  document.querySelector('#tenantBadge').textContent = sum.activeTenants;
  document.querySelector('#roomBadge').textContent = sum.rentedRooms;

  switch(page) {
    case 'dashboard': renderDashboard(main, sum); break;
    case 'tenants': renderTenants(main); break;
    case 'rooms': renderRooms(main); break;
    case 'transactions': renderTransactions(main); break;
    case 'ledger': renderLedger(main); break;
    case 'utilities': renderUtilities(main); break;
    case 'deposits': renderDeposits(main); break;
    case 'reports': renderReports(main, sum); break;
    case 'backup': renderBackup(main); break;
    default: main.innerHTML = `<div class="empty"><div class="icon">🔧</div><h4>功能开发中</h4></div>`;
  }
}

    <div class="modal-body">

      <div class="form-group"><label>房间</label>

      <div class="form-group"><label>押金</label><input type="number" class="form-control" id="tDeposit"></div>
      <div class="form-group"><label>备注</label><input class="form-control" id="tNote"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAddTenant()">保存</button>
    </div>
  `);
}

function saveAddTenant() {
  const name = $('tName').value.trim();
  if (!name) return showToast('请输入姓名', 'error');
  STORE.addTenant({
    name: name,
    phone: $('tPhone').value.trim(),
    source: $('tSource').value.trim(),
    roomId: $('tRoom').value,
    startDate: $('tStart').value,
    endDate: $('tEnd').value || null,
    deposit: parseFloat($('tDeposit').value) || 0,
    depositReturned: false,
    notes: $('tNote').value.trim()
  });
  closeModal();
  goPage('tenants');
  showToast('添加成功');
}

function doEndTenant(id) {
  if (!confirm('确认退租？')) return;
  STORE.endTenant(id, new Date().toISOString().slice(0,10));
  goPage('tenants');
  showToast('已退租');
}

function doReturnDeposit(id) {
  if (!confirm('确认退还押金？')) return;
  STORE.updateTenant(id, { depositReturned: true });
  goPage('deposits');
  showToast('押金已退还');
}

  const amount = parseFloat($('incAmount').value);

    交易时间: $('incTime').value || new Date().toISOString().slice(0,16)+':00',

    对方: $('incParty').value.trim(),
    收: '收入',
    金额: amount,
    水费: parseFloat($('incWater').value)||0,
    电费: parseFloat($('incElec').value)||0,
    备注: $('incNote').value.trim()
  });
  closeModal();
  goPage('transactions');
  showToast('添加成功');
}

function openAddLedger() {
  openModal(`
    <div class="modal-header"><h3>添加台账</h3></div>
    <div class="modal-body">
      <div class="form-group"><label>时间</label><input type="datetime-local" class="form-control" id="lTime"></div>
      <div class="form-row">
        <div class="form-group"><label>类型</label><input class="form-control" id="lType" value="转账"></div>
        <div class="form-group"><label>收/支</label>
          <select class="form-control" id="lIO"><option value="收入">收入</option><option value="支出">支出</option></select>
        </div>
      </div>
      <div class="form-group"><label>对方</label><input class="form-control" id="lParty"></div>
      <div class="form-group"><label>金额</label><input type="number" class="form-control" id="lAmount"></div>
      <div class="form-row">
        <div class="form-group"><label>水费</label><input type="number" class="form-control" id="lWater"></div>
        <div class="form-group"><label>电费</label><input type="number" class="form-control" id="lElec"></div>
      </div>
      <div class="form-group"><label>备注</label><input class="form-control" id="lNote"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAddLedger()">保存</button>
    </div>
  `);
}

function saveAddLedger() {
  const amount = parseFloat($('lAmount').value);
  if (!amount) return showToast('请输入金额', 'error');
  STORE.addLedger({
    交易时间: $('lTime').value || new Date().toISOString().slice(0,16)+':00',
    交易类: $('lType').value.trim(),
    对方: $('lParty').value.trim(),
    收: $('lIO').value,
    金额: amount,
    水费: parseFloat($('lWater').value)||0,
    电费: parseFloat($('lElec').value)||0,
    备注: $('lNote').value.trim()
  });
  closeModal();
  goPage('ledger');
  showToast('添加成功');
}

function openAddBill() {
  openModal(`
    <div class="modal-header"><h3>添加抄表</h3></div>
    <div class="modal-body">
      <div class="form-group"><label>月份</label><input type="month" class="form-control" id="bMonth"></div>
      <div class="form-row">
        <div class="form-group"><label>楼栋</label>
          <select class="form-control" id="bBuilding"><option value="305栋">305栋</option><option value="106栋">106栋</option></select>
        </div>
        <div class="form-group"><label>类型</label>
          <select class="form-control" id="bType"><option value="电费">电费</option><option value="水费">水费</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>用量</label><input type="number" class="form-control" id="bUsage"></div>
        <div class="form-group"><label>金额</label><input type="number" class="form-control" id="bAmount"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAddBill()">保存</button>
    </div>
  `);
}

function saveAddBill() {
  const amount = parseFloat($('bAmount').value);
  if (!amount) return showToast('请输入金额', 'error');
  STORE.addBill({
    month: $('bMonth').value,
    building: $('bBuilding').value,
    type: $('bType').value,
    usage: parseFloat($('bUsage').value)||0,
    amount: amount
  });
  closeModal();
  goPage('utilities');
  showToast('添加成功');
}

function doDelLedger(id) {
  if (!confirm('确定删除？')) return;
  STORE.delLedger(id);
  goPage('ledger');
  showToast('已删除');
}

function doDelBill(id) {
  if (!confirm('确定删除？')) return;
  const bills = STORE.getBills();
  const idx = bills.findIndex(b => b.id === id);
  if (idx > -1) bills.splice(idx, 1);
  STORE.save();
  goPage('utilities');
  showToast('已删除');
}

function doExport() {
  const json = STORE.export();
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `租房系统备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('导出成功');
}

function doImport() {
  const file = $('importFile').files[0];
  if (!file) return showToast('请选择文件', 'error');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      STORE.import(data);
      goPage(currentPage);
      showToast('导入成功');
    } catch (err) {
      showToast('导入失败：格式错误', 'error');
    }
  };
  reader.readAsText(file);
}

window.addEventListener('DOMContentLoaded', () => {
  STORE.init();
  goPage(window.location.hash.slice(1) || 'dashboard');
});
</script>
